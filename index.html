        </div>
        
        <div class="controls">
            <div class="filter-group">

                    <option value="2025-2026" selected>2025-2026</option>

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;color:#999;">暂无记录</td></tr>';
                document.getElementById('recordCount').textContent = '共 0 条记录 · 杭州电子科技大学教务处提供';
                return;
            }
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.学年}</td>
                    <td>${item.学期}</td>
                    <td>${item.课程代码}</td>
                    <td>${item.课程名称}</td>

                    <td>${item.开课学院}</td>
                    <td>${item.任课教师}</td>

                tbody.appendChild(tr);
            });
            document.getElementById('recordCount').textContent = `共 ${data.length} 条记录 · 杭州电子科技大学教务处提供`;

            if (yearVal !== 'all') {

            }
            if (termVal !== 'all') {
                filtered = filtered.filter(item => String(item.学期) === termVal);
            }
            renderTable(filtered);
        }
